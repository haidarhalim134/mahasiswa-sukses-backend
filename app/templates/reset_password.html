<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    width:350px;
}

h2{
    margin-bottom:20px;
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    background:#2563eb;
    border:none;
    color:white;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:disabled{
    background:#9ca3af;
    cursor:not-allowed;
}

.message{
    font-size:13px;
    margin-top:6px;
}

.error{
    color:red;
}

.success{
    color:green;
}
</style>
</head>

<body>

<div class="container">
<h2>Reset Password</h2>

<input
    type="password"
    id="password"
    placeholder="New password"
    oninput="validatePassword()"
/>

<div id="lengthMsg" class="message"></div>

<input
    type="password"
    id="confirmPassword"
    placeholder="Confirm password"
    oninput="validatePassword()"
/>

<div id="matchMsg" class="message"></div>

<button id="resetBtn" onclick="resetPassword()" disabled>
Reset Password
</button>

</div>

<script>

function validatePassword(){

    const password = document.getElementById("password").value
    const confirmPassword = document.getElementById("confirmPassword").value

    const lengthMsg = document.getElementById("lengthMsg")
    const matchMsg = document.getElementById("matchMsg")
    const resetBtn = document.getElementById("resetBtn")

    let valid = true

    // length check
    if(password.length < 8){
        lengthMsg.textContent = "Password must be at least 8 characters"
        lengthMsg.className = "message error"
        valid = false
    }else{
        lengthMsg.textContent = "Password length OK"
        lengthMsg.className = "message success"
    }

    // match check
    if(confirmPassword && password !== confirmPassword){
        matchMsg.textContent = "Passwords do not match"
        matchMsg.className = "message error"
        valid = false
    }else if(confirmPassword){
        matchMsg.textContent = "Passwords match"
        matchMsg.className = "message success"
    }

    resetBtn.disabled = !valid
}

async function resetPassword(){

    const password = document.getElementById("password").value

    const hash = window.location.hash
    const params = new URLSearchParams(hash.substring(1))
    const access_token = params.get("access_token")

    const res = await fetch("/api/v1/auth/update-password",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            access_token: access_token,
            password: password
        })
    })

    if(res.ok){
        alert("Password updated successfully!")
    }else{
        alert("Error updating password")
    }
}

</script>

</body>
</html>
